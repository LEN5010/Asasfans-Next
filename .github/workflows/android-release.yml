name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.3.5"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore signing config
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "$ANDROID_KEYSTORE_BASE64" || -z "$ANDROID_KEYSTORE_PASSWORD" || -z "$ANDROID_KEY_ALIAS" || -z "$ANDROID_KEY_PASSWORD" ]]; then
            echo "Missing Android signing secrets." >&2
            exit 1
          fi

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > asasfans-release.jks
          {
            echo "storeFile=asasfans-release.jks"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > keystore.properties

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Run lint
        run: ./gradlew lintDebug

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Prepare APK artifact
        shell: bash
        run: |
          cp app/build/outputs/apk/release/app-release.apk "Asasfans-Next-${{ steps.release_tag.outputs.tag }}.apk"
          shasum -a 256 "Asasfans-Next-${{ steps.release_tag.outputs.tag }}.apk"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Asasfans-Next-${{ steps.release_tag.outputs.tag }}
          path: Asasfans-Next-${{ steps.release_tag.outputs.tag }}.apk
          if-no-files-found: error

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        shell: bash
        run: |
          apk="Asasfans-Next-${RELEASE_TAG}.apk"
          notes_file="release-notes/${RELEASE_TAG#v}.md"

          if [[ -f "$notes_file" ]]; then
            notes_args=(--notes-file "$notes_file")
          else
            notes_args=(--notes "Asasfans Next ${RELEASE_TAG}")
          fi

          gh release view "$RELEASE_TAG" >/dev/null 2>&1 \
            && gh release upload "$RELEASE_TAG" "$apk" --clobber \
            || gh release create "$RELEASE_TAG" "$apk" \
              --title "Asasfans Next ${RELEASE_TAG}" \
              "${notes_args[@]}"
